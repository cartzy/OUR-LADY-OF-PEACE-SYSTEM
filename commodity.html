<!-- Firebase (Realtime Database + Anonymous Auth) — same project as OLPECSYS.html so this
     store app shares live member data and syncs its own store data across devices/staff. -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC2eB4_YOhgOAju8erZvk9GvgTkaA9H1a0",
    authDomain: "olpec-ebd77.firebaseapp.com",
    databaseURL: "https://olpec-ebd77-default-rtdb.firebaseio.com",
    projectId: "olpec-ebd77",
    storageBucket: "olpec-ebd77.firebasestorage.app",
    messagingSenderId: "599076895937",
    appId: "1:599076895937:web:a19c066b9d9d02010ce840",
  };
  firebase.initializeApp(firebaseConfig);
  window.firebaseDb = firebase.database();

  // Anonymous auth lets the Realtime Database security rules require "auth != null"
  // without needing a staff login screen yet. window.firebaseReady resolves once we
  // have a signed-in user; the app waits for this before reading/writing shared data.
  window.firebaseReady = new Promise((resolve) => {
    firebase.auth().onAuthStateChanged((user) => {
      if (user) { resolve(user); return; }
      firebase.auth().signInAnonymously().catch((err) => {
        console.error("Firebase anonymous sign-in failed:", err);
        resolve(null); // fall back to local-only persistence rather than hang forever
      });
    });
  });
</script>
<style>
  :root{
    --blue-50:#EEF3FC; --blue-100:#D7E4F8; --blue-500:#3776DC; --blue-600:#145CC9; --blue-700:#0D3D96;
    --cobalt:#0047AB; --navy:#0B3D91;
    --gold-400:#FDBB24; --gold-500:#FDB913; --gold-600:#E0A100; --gold-700:#B37F00; --gold-100:#FFEEC2; --gold-50:#FFF9E8;
    --bg:#EDF4FC; --card:#FFFFFF; --border:#F0EFEC; --border-strong:#E7E5E4; --stone-900:#1c1c1a; --stone-800:#2b2b28; --stone-700:#44443f;
    --stone-600:#5c5c55; --stone-500:#7a7a72; --stone-400:#a3a39a; --stone-100:#f5f5f4; --stone-50:#f8f7f3;
    --green-bg:#DCF5E4; --green-fg:#157A38; --red-bg:#FEE0E0; --red-fg:#B01F1F; --amber-bg:#FFEEC2; --amber-fg:#B37F00;
  }
  *{box-sizing:border-box;}
  html.dark{ --bg:#121212; --card:#1E1E1E; --border:#2A2A2A; --border-strong:#333333; --stone-900:#F5F5F5; --stone-800:#E0E0E0; --stone-700:#C7C7C7;
    --stone-600:#A8A8A8; --stone-500:#8A8A8A; --stone-400:#6E6E6E; --stone-100:#202020; --stone-50:#181818; }
  body{ margin:0; font-family: 'Aptos', 'Inter', system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--stone-800); letter-spacing:-0.01em; }
  .tabnum{ font-variant-numeric: tabular-nums; }
  a,button{ cursor:pointer; }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background:#DCE3F0; border-radius:8px; }
  html.dark ::-webkit-scrollbar-thumb{ background:#333; }

  .app{ height:100vh; display:flex; }
  .sidebar{ width:256px; flex-shrink:0; background:var(--navy); display:flex; flex-direction:column; transition: width .18s ease; }
  html.dark .sidebar{ background:#1A1A1A; }
  .sidebar.collapsed{ width:0; overflow:hidden; }
  .sidebar .brand{ height:73px; display:flex; align-items:center; gap:10px; padding:0 20px; flex-shrink:0; }
  .sidebar .brand .logo{ width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:13px; flex-shrink:0;}
  .sidebar .brand .name{ font-weight:600; color:#fff; font-size:16px; line-height:1.2; white-space:nowrap; overflow:hidden;}
  .sidebar .brand .name small{ display:block; font-weight:400; color:rgba(255,255,255,0.4); font-size:11px; text-transform:uppercase; letter-spacing:.04em; margin-top:2px; }
  .nav{ flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:2px; }
  .nav button{ display:flex; align-items:center; gap:11px; border:none; background:transparent; width:100%; text-align:left; padding:10px 12px; border-radius:10px; font-size:13.5px; font-weight:500; color:#FFE9A8; white-space:nowrap; overflow:hidden; transition:background-color .15s ease, color .15s ease;}
  .nav button .ico{ width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:rgba(20,92,201,0.45); border:1px solid rgba(255,255,255,0.18); color:#fff; }
  .nav button:hover{ background:rgba(255,255,255,0.9); color:var(--navy); }
  .nav button:hover .ico{ background:transparent; border-color:transparent; color:var(--navy); }
  .nav button.active{ background:var(--gold-500); color:var(--navy); font-weight:600; }
  .nav button.active .ico{ background:rgba(255,255,255,0.3); border-color:transparent; color:var(--navy); }
  .sidebar .foot{ padding:12px; border-top:1px solid rgba(255,255,255,0.1); flex-shrink:0; }
  .sidebar .foot button{ width:100%; border:none; background:transparent; color:rgba(255,255,255,0.6); font-size:12.5px; font-weight:500; padding:8px; border-radius:10px; display:flex; align-items:center; justify-content:center; gap:8px;}
  .sidebar .foot button:hover{ background:rgba(255,255,255,0.05); color:#fff; }

  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar{ height:73px; background:rgba(237,244,252,0.9); backdrop-filter:blur(6px); border-bottom:1px solid var(--border-strong); display:flex; align-items:center; justify-content:space-between; padding:0 24px; flex-shrink:0; position:sticky; top:0; z-index:10; }
  html.dark .topbar{ background:#1A1A1A; }
  html.dark .iconbtn{ color:#FFE9A8; }
  html.dark .iconbtn:hover{ color:#fff; }
  .topbar h1{ font-size:18px; margin:0; font-weight:700; color:var(--stone-900); }
  .topbar .right{ display:flex; align-items:center; gap:4px; }
  .topbar-search{ position:relative; flex:1; max-width:440px; min-width:0; }
  .topbar-search input{ width:100%; padding:10px 14px 10px 38px; border-radius:999px; border:1px solid var(--border-strong); background:var(--card); font-size:13.5px; color:var(--stone-800); }
  .topbar-search input:focus{ outline:2px solid var(--blue-500); outline-offset:0; border-color:transparent; }
  .topbar-search .search-ico{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--stone-400); pointer-events:none; display:flex; }
  .topbar-link{ display:flex; align-items:center; gap:6px; border:none; background:transparent; color:var(--cobalt); font-size:13px; font-weight:600; padding:8px 10px; border-radius:8px; white-space:nowrap; }
  .topbar-link:hover{ background:var(--card); }
  html.dark .topbar-link{ color:#FFE9A8; }
  .iconbtn{ border:none; background:transparent; padding:9px; border-radius:999px; color:var(--cobalt); position:relative; }
  .iconbtn:hover{ background:var(--card); color:var(--stone-900); }
  .badge-dot{ position:absolute; top:-1px; right:-1px; background:#EB3D3D; color:#fff; font-size:10px; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .avatar{ width:32px; height:32px; border-radius:50%; background:var(--gold-400); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
  .content{ flex:1; overflow-y:auto; padding:24px; }

  .card{ background:var(--card); border:1px solid var(--border); border-radius:20px; box-shadow:0 1px 2px rgba(23,36,29,0.05); padding:20px; }
  .card[onclick]{ transition:box-shadow .15s ease, transform .15s ease; }
  .card[onclick]:hover{ box-shadow:0 4px 16px rgba(23,36,29,0.08); transform:translateY(-2px); }
  .grid{ display:grid; gap:16px; }
  .grid-4{ grid-template-columns:repeat(4,1fr); }
  .grid-3{ grid-template-columns:repeat(3,1fr); }
  .grid-2{ grid-template-columns:repeat(2,1fr); }
  @media (max-width:1000px){ .grid-4,.grid-3,.grid-2{ grid-template-columns:1fr; } }

  .stat-icon{ width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
  .stat-value{ font-size:24px; font-weight:800; color:var(--stone-900); }
  .stat-label{ font-size:13px; color:var(--stone-500); margin-top:2px; }
  .stat-sub{ font-size:12px; color:var(--stone-400); margin-top:3px; }

  h2.section-title{ font-size:15px; font-weight:700; color:var(--stone-900); margin:0 0 14px 0; display:flex; align-items:center; gap:8px;}

  table{ width:100%; border-collapse:collapse; font-size:14.5px; }
  thead th{ text-align:left; color:var(--stone-400); font-size:11px; text-transform:uppercase; letter-spacing:.04em; font-weight:700; padding-bottom:8px; border-bottom:1px solid var(--border); }
  tbody td{ padding:13px 0; border-bottom:1px solid var(--border); color:var(--stone-700); vertical-align:top; }
  tbody tr:hover td{ background:var(--stone-50); }
  td.tr{ text-align:right; }
  .muted{ color:var(--stone-400); font-size:12px; }
  .strong{ color:var(--stone-800); font-weight:600; }

  .btn{ border:none; border-radius:10px; font-size:13.5px; font-weight:600; padding:9px 15px; display:inline-flex; align-items:center; gap:7px; }
  .btn-primary{ background:var(--cobalt); color:#fff; }
  .btn-primary:hover{ background:var(--navy); }
  .btn-accent{ background:var(--gold-500); color:#fff; }
  .btn-accent:hover{ background:var(--gold-600); }
  .btn-outline{ background:transparent; border:1px solid var(--border); color:var(--stone-700); }
  .btn-outline:hover{ background:var(--stone-50); }
  .btn-dark{ background:var(--stone-800); color:#fff; }
  .btn:disabled{ opacity:.4; }
  .btn-block{ width:100%; justify-content:center; }
  .btn-quick{ width:100%; justify-content:flex-start; margin-bottom:8px; }

  .badge{ font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px; display:inline-block; }
  .badge-green{ background:var(--green-bg); color:var(--green-fg); }
  .badge-red{ background:var(--red-bg); color:var(--red-fg); }
  .badge-amber{ background:var(--amber-bg); color:var(--amber-fg); }
  .badge-blue{ background:var(--blue-50); color:var(--blue-700); }
  .badge-stone{ background:var(--stone-100); color:var(--stone-600); }

  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:11.5px; font-weight:700; color:var(--stone-500); text-transform:uppercase; letter-spacing:.03em; margin-bottom:7px; }
  .input, select.input, textarea.input{ width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); font-size:14.5px; background:var(--card); color:var(--stone-800); }
  .combobox{ position:relative; }
  .combobox-list{ position:fixed; z-index:70; background:var(--card); border:1px solid var(--border-strong); border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,.15); max-height:220px; overflow-y:auto; padding:4px; }
  .combobox-opt{ padding:8px 10px; border-radius:8px; cursor:pointer; font-size:13.5px; color:var(--stone-800); }
  .combobox-opt:hover, .combobox-opt.active{ background:var(--stone-50); }
  .combobox-opt .muted{ font-size:12px; }
  .combobox-empty{ padding:10px; text-align:center; color:var(--stone-400); font-size:13px; }
  .input:focus{ outline:2px solid var(--blue-500); outline-offset:0; border-color:transparent; }
  .row{ display:flex; gap:10px; }
  .row > *{ flex:1; }

  .empty{ display:flex; flex-direction:column; align-items:center; justify-content:center; padding:50px 10px; text-align:center; }
  .empty .circ{ width:48px; height:48px; border-radius:50%; background:var(--stone-100); display:flex; align-items:center; justify-content:center; margin-bottom:14px; color:var(--stone-400); }
  .empty .t{ font-weight:600; color:var(--stone-700); font-size:14px; }
  .empty .s{ font-size:13px; color:var(--stone-400); margin-top:3px; }

  .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; padding:16px; z-index:60; }
  .modal{ background:var(--card); border-radius:16px; width:100%; max-width:540px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.25); }
  .modal.wide{ max-width:860px; }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; padding:18px 26px; border-bottom:1px solid var(--border); }
  .modal-head h3{ margin:0; font-size:17px; font-weight:700; color:var(--stone-900); }
  .modal-body{ padding:26px; }
  .modal.wide .modal-body{ padding:26px; }
  .modal-close{ border:none; background:transparent; color:var(--stone-400); padding:4px; border-radius:8px; }
  .modal-close:hover{ color:var(--stone-700); }

  .cart-list{ border:1px solid var(--border); border-radius:10px; max-height:260px; overflow-y:auto; margin-bottom:12px; }
  .cart-item{ display:flex; align-items:center; justify-content:between; justify-content:space-between; padding:9px 12px; border-bottom:1px solid var(--border); font-size:13.5px; }
  .cart-item:last-child{ border-bottom:none; }
  .pay-toggle{ display:flex; gap:8px; }
  .pay-toggle button{ flex:1; padding:9px; border-radius:10px; border:1px solid var(--border); background:transparent; font-size:13px; font-weight:600; color:var(--stone-600); }
  .pay-toggle button.active{ background:var(--cobalt); color:#fff; border-color:var(--cobalt); }
  .pay-toggle button:disabled{ opacity:.35; }

  .sparkline-wrap{ width:100%; }
  .icon-x{ display:inline-flex; }

  .receipt{ font-family: 'Courier New', monospace; font-size:13px; color:#111; max-width:300px; margin:0 auto; }
  .receipt .center{ text-align:center; }
  .receipt hr{ border:none; border-top:1px dashed #888; margin:10px 0; }
  .receipt .line{ display:flex; justify-content:space-between; margin-bottom:3px; }
  .receipt .biz{ font-weight:800; font-size:15px; }
  @media print {
    body *{ visibility:hidden; }
    .receipt, .receipt *{ visibility:visible; }
    .receipt{ position:absolute; top:0; left:0; width:100%; }
    .no-print{ display:none !important; }
  }
</style>
</head>

/* ======================= Persistence ======================= */
/* The app now saves its own data (products, members, sales, purchases,
   suppliers, utang payments, closings, settings) to localStorage so nothing
   is lost on refresh or when the tab is reopened. Every render() call writes
   the latest snapshot; on startup we load it back before the first paint.
   Members stay excluded here when OLPECSYS_MEMBERS is present, since that
   external roster is already the source of truth for this session. */
const OLCOSYS_LS_KEY = "olcosys:store-data";

/* ---- Firebase sync flags ----
   *RemoteUpdate: true for exactly one render() right after data arrived FROM Firebase,
   so persistState() (which every render() calls) knows not to immediately echo that
   same data straight back up. *Synced: true once we've heard back from Firebase at
   least once for that node, so we don't overwrite real remote data with our local
   seed data before we've actually checked what's there. */
let _fbStoreRemoteUpdate = false, _fbStoreSynced = false;
let _fbMembersRemoteUpdate = false, _fbMembersSynced = false;

function persistState(){
  var snapshot = {
    products: state.products,
    suppliers: state.suppliers,
    sales: state.sales,
    purchases: state.purchases,
    utangPayments: state.utangPayments,
    closings: state.closings,
    settings: state.settings,
    darkMode: state.darkMode,
    sidebarOpen: state.sidebarOpen,
    page: state.page,
  };
  if(!OLPECSYS_MEMBERS){ snapshot.members = state.members; }
  try{
    window.localStorage.setItem(OLCOSYS_LS_KEY, JSON.stringify(snapshot));
  }catch(e){ /* storage unavailable/full — app still works in-memory for this session */ }

  /* Store data (products, sales, purchases, utang, settings, etc.) → Firebase. */
  if(_fbStoreRemoteUpdate){ _fbStoreRemoteUpdate = false; }
  else if(_fbStoreSynced && window.firebaseDb){
    window.firebaseReady.then(function(){
      window.firebaseDb.ref("commodityStore").set(snapshot).catch(function(e){ console.error("Firebase store write failed:", e); });
    });
  }

  /* Members can be edited here too (loyalty points on sale, the member edit form),
     so push those changes back to the same "members" node OLPECSYS.html reads/writes. */
  if(_fbMembersRemoteUpdate){ _fbMembersRemoteUpdate = false; }
  else if(_fbMembersSynced && window.firebaseDb){
    window.firebaseReady.then(function(){
      window.firebaseDb.ref("members").set(state.members).catch(function(e){ console.error("Firebase members write failed:", e); });
    });
  }
}
function loadPersistedState(){
  try{
    var raw = window.localStorage.getItem(OLCOSYS_LS_KEY);
    if(!raw) return;
    var saved = JSON.parse(raw);
    if(!saved || typeof saved!=="object") return;
    ["products","suppliers","sales","purchases","utangPayments","closings"].forEach(function(k){
      if(Array.isArray(saved[k])) state[k] = saved[k];
    });
    if(!OLPECSYS_MEMBERS && Array.isArray(saved.members)) state.members = saved.members;
    if(saved.settings && typeof saved.settings==="object") state.settings = Object.assign({}, state.settings, saved.settings);
    if(typeof saved.darkMode==="boolean") state.darkMode = saved.darkMode;
    if(typeof saved.sidebarOpen==="boolean") state.sidebarOpen = saved.sidebarOpen;
    if(typeof saved.page==="string") state.page = saved.page;
  }catch(e){ /* corrupt/unavailable storage — fall back to seed data */ }
}
loadPersistedState();

/* Pulls live data from Firebase after the first (localStorage-based) paint, then keeps
   listening for changes made by other staff/devices for as long as the tab is open. */
function initFirebaseSync(){
  if(!window.firebaseDb || !window.firebaseReady) return;
  window.firebaseReady.then(function(){

    window.firebaseDb.ref("members").on("value", function(snapshot){
      var val = snapshot.val();
      if(val === null){
        window.firebaseDb.ref("members").set(state.members).catch(function(e){ console.error("Firebase members seed failed:", e); });
      } else if(Array.isArray(val)){
        _fbMembersRemoteUpdate = true;
        state.members = val;
        state._shellCache = null;
        render();
      }
      _fbMembersSynced = true;
    }, function(err){ console.error("Firebase members read failed:", err); _fbMembersSynced = true; });

    window.firebaseDb.ref("commodityStore").on("value", function(snapshot){
      var val = snapshot.val();
      if(val === null){
        var seed = {
          products: state.products, suppliers: state.suppliers, sales: state.sales,
          purchases: state.purchases, utangPayments: state.utangPayments, closings: state.closings,
          settings: state.settings, darkMode: state.darkMode, sidebarOpen: state.sidebarOpen, page: state.page,
        };
        if(!OLPECSYS_MEMBERS){ seed.members = state.members; }
        window.firebaseDb.ref("commodityStore").set(seed).catch(function(e){ console.error("Firebase store seed failed:", e); });
      } else if(val && typeof val==="object"){
        _fbStoreRemoteUpdate = true;
        ["products","suppliers","sales","purchases","utangPayments","closings"].forEach(function(k){
          if(Array.isArray(val[k])) state[k] = val[k];
        });
        if(!OLPECSYS_MEMBERS && Array.isArray(val.members)) state.members = val.members;
        if(val.settings && typeof val.settings==="object") state.settings = Object.assign({}, state.settings, val.settings);
        if(typeof val.darkMode==="boolean") state.darkMode = val.darkMode;
        if(typeof val.sidebarOpen==="boolean") state.sidebarOpen = val.sidebarOpen;
        if(typeof val.page==="string") state.page = val.page;
        state._shellCache = null;
        render();
      }
      _fbStoreSynced = true;
    }, function(err){ console.error("Firebase store read failed:", err); _fbStoreSynced = true; });

  });
}

/* ======================= Derived helpers ======================= */
function productById(id){ return state.products.find(function(p){return p.id===id;}); }
function memberById(id){ return state.members.find(function(m){return m.id===id;}); }
function supplierById(id){ return state.suppliers.find(function(s){return s.id===id;}); }
function memberName(id){ if(!id) return "Cash Sales"; var m = memberById(id); return m? m.name : "Unknown Member"; }
function memberBalance(memberId){
  var owed = state.sales.filter(function(s){return s.memberId===memberId && s.paymentMethod==="utang";})
    .reduce(function(sum,s){return sum + (s.total - s.amountPaid);},0);
  var paid = state.utangPayments.filter(function(p){return p.memberId===memberId;}).reduce(function(sum,p){return sum+p.amount;},0);
  return Math.max(0, owed-paid);
}
function lowStockProducts(){ return state.products.filter(function(p){return p.stockQty<=p.reorderLevel;}); }
function daysUntil(dateStr){ if(!dateStr) return null; var ms = new Date(dateStr) - new Date(todayISO()); return Math.round(ms/(1000*60*60*24)); }
function expiredProducts(){ return state.products.filter(function(p){ var d=daysUntil(p.expiryDate); return d!==null && d<0; }); }
function expiringSoonProducts(){ return state.products.filter(function(p){ var d=daysUntil(p.expiryDate); return d!==null && d>=0 && d<=14; }); }
function inventoryValue(){ return state.products.reduce(function(s,p){return s+p.stockQty*p.costPrice;},0); }
function last7Days(){
  var days=[];
  for(var i=6;i>=0;i--){
    var iso = offsetDate(i);
    var total = state.sales.filter(function(s){return s.date===iso;}).reduce(function(sum,s){return sum+s.total;},0);
    var d = new Date(iso+"T00:00:00");
    var mon = d.toLocaleDateString("en-US", {month:"short"});
    var label = mon+"-"+d.getFullYear();
    var dayLabel = d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
    days.push({date: iso, label: label, dayLabel: dayLabel, value: total});
  }
  return days;
}
function prev7DaysTotal(){
  var total=0;
  for(var i=13;i>=7;i--){
    var iso = offsetDate(i);
    total += state.sales.filter(function(s){return s.date===iso;}).reduce(function(sum,s){return sum+s.total;},0);
  }
  return total;
}

// Trailing 12 calendar months (oldest first), each bucketed by summing every sale whose date
// falls in that month. Labels are "Mmm-YYYY" (e.g. "Jul-2026") for the chart's x-axis.
function last12Months(){
  var months=[];
  var now = new Date();
  for(var i=11;i>=0;i--){
    var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    var key = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    var total = state.sales.filter(function(s){ return s.date.slice(0,7)===key; })
      .reduce(function(sum,s){return sum+s.total;},0);
    var mon = d.toLocaleDateString("en-US", {month:"short"});
    months.push({date: key, label: mon+"-"+d.getFullYear(), dayLabel: mon+"-"+d.getFullYear(), value: total});
  }
  return months;
}
function prev12MonthsTotal(){
  var now = new Date();
  var total=0;
  for(var i=23;i>=12;i--){
    var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    var key = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    total += state.sales.filter(function(s){ return s.date.slice(0,7)===key; })
      .reduce(function(sum,s){return sum+s.total;},0);
  }
  return total;
}

/* ======================= Actions ======================= */
function recordSale(memberId, items, paymentMethod, cashTendered){
  var total = items.reduce(function(s,it){return s+it.qty*it.price;},0);
  var tendered = paymentMethod==="cash" ? Number(cashTendered)||total : 0;
  var change = paymentMethod==="cash" ? Math.max(0, tendered-total) : 0;
  var pointsEarned = total * POINTS_RATE;
  var sale = {id:uid("sl"), orNo:"OR-"+String(state.sales.length+1).padStart(6,"0"), date:todayISO(), time:new Date().toLocaleTimeString("en-PH",{hour:"2-digit",minute:"2-digit"}), memberId:memberId||null, items:items, total:total, paymentMethod:paymentMethod, amountPaid: paymentMethod==="cash"?total:0, cashTendered:tendered, change:change, pointsEarned:pointsEarned};
  state.sales.unshift(sale);
  items.forEach(function(it){
    var p = productById(it.productId);
    if(p) p.stockQty = Math.max(0, p.stockQty - it.qty);
  });
  if(memberId){
    var member = memberById(memberId);
    if(member) member.points = (member.points||0) + pointsEarned;
  }
  return sale;
}
function recordClosing(dateStr, actualCash){
  var expected = expectedCashForDate(dateStr);
  var closing = {id:uid("cl"), date:dateStr, expectedCash:expected, actualCash:actualCash, variance: actualCash-expected};
  state.closings = state.closings.filter(function(c){return c.date!==dateStr;});
  state.closings.unshift(closing);
  return closing;
}
function expectedCashForDate(dateStr){
  var cashSales = state.sales.filter(function(s){return s.date===dateStr && s.paymentMethod==="cash";}).reduce(function(s,x){return s+x.amountPaid;},0);
  var utangCollected = state.utangPayments.filter(function(p){return p.date===dateStr;}).reduce(function(s,x){return s+x.amount;},0);
  return cashSales + utangCollected;
}
function recordPurchase(supplierId, items){
  var total = items.reduce(function(s,it){return s+it.qty*it.cost;},0);
  state.purchases.unshift({id:uid("pu"), date:todayISO(), supplierId:supplierId, items:items, total:total});
  items.forEach(function(it){
    var p = productById(it.productId);
    if(p){ p.stockQty += it.qty; p.costPrice = it.cost; }
  });
}
function recordUtangPayment(memberId, amount){
  state.utangPayments.unshift({id:uid("pay"), date:todayISO(), memberId:memberId, amount:amount, note:"Payment"});
}
function addProduct(p){ state.products.unshift(Object.assign({id:uid("p")}, p)); }
function updateProduct(id, patch){ state.products = state.products.map(function(p){ return p.id===id ? Object.assign({}, p, patch) : p; }); }
function deleteProduct(id){ state.products = state.products.filter(function(p){return p.id!==id;}); }

function updateMember(id, patch){ state.members = state.members.map(function(m){ return m.id===id ? Object.assign({}, m, patch) : m; }); }
function deleteMember(id){ state.members = state.members.filter(function(m){return m.id!==id;}); }
function addSupplier(s){ state.suppliers.unshift(Object.assign({id:uid("s")}, s)); }

function toggleSelect(listKey, id, evt){

/* Renders a "Show [10] of N members ... Showing 1 to 10 of N results ... First Prev 1 2 … N Next Last"
   bar, matching the pagination style used across OLPECSYS. `uiKey` is the state.ui field prefix
   (e.g. "utang" reads/writes state.ui.utangPage and state.ui.utangPageSize). */
function paginationBar(uiKey, total, itemLabel){
  var page = state.ui[uiKey+"Page"] || 1;
  var pageSize = state.ui[uiKey+"PageSize"] || 10;
  var totalPages = Math.max(1, Math.ceil(total / pageSize));
  page = Math.min(Math.max(1, page), totalPages);
  var startItem = total === 0 ? 0 : (page - 1) * pageSize + 1;
  var endItem = Math.min(page * pageSize, total);

  var pages = [];
  if (totalPages <= 7) {
    for (var i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (page > 3) pages.push("…");
    for (var i = Math.max(2, page - 1); i <= Math.min(totalPages - 1, page + 1); i++) pages.push(i);
    if (page < totalPages - 2) pages.push("…");
    pages.push(totalPages);
  }
  var pageBtns = pages.map(function(p){
    if (p === "…") return '<span class="muted" style="padding:0 6px;">…</span>';
    var active = p === page;
    return '<button onclick="state.ui.'+uiKey+'Page='+p+'; render();" style="min-width:28px;height:28px;border:none;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;'+
      (active ? "background:var(--gold-500);color:var(--navy);" : "background:transparent;color:var(--stone-600);") + '">'+p+'</button>';
  }).join("");

  function navBtn(label, targetPage, disabled){
    return '<button onclick="state.ui.'+uiKey+'Page='+targetPage+'; render();" '+(disabled?"disabled":"")+
      ' style="padding:4px 8px;border:none;background:transparent;font-size:12.5px;font-weight:700;cursor:'+(disabled?"default":"pointer")+';color:'+(disabled?"var(--stone-400)":"var(--stone-600)")+';">'+label+'</button>';
  }

  return '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:14px 2px 2px;border-top:1px solid var(--border);margin-top:8px;font-size:13px;">' +
    '<div style="display:flex;align-items:center;gap:8px;color:var(--stone-500);">Show ' +
      '<select onchange="state.ui.'+uiKey+'PageSize=Number(this.value); state.ui.'+uiKey+'Page=1; render();" style="border:1px solid var(--border-strong);border-radius:8px;padding:3px 6px;font-size:13px;background:var(--card);color:var(--stone-800);">' +
        [10,25,50,100].map(function(n){ return '<option value="'+n+'" '+(n===pageSize?"selected":"")+'>'+n+'</option>'; }).join("") +
      '</select> of '+total+' '+itemLabel+'</div>' +
    '<div class="muted">Showing '+startItem+' to '+endItem+' of '+total+' results</div>' +
    '<div style="display:flex;align-items:center;gap:2px;">' +
      navBtn("First", 1, page<=1) + navBtn("Prev", page-1, page<=1) + pageBtns +
      navBtn("Next", page+1, page>=totalPages) + navBtn("Last", totalPages, page>=totalPages) +
    '</div>' +
  '</div>';
}
/* Slices a list according to state.ui[uiKey+"Page"/"PageSize"], clamping the page if the list shrank. */
function paginate(uiKey, list){
  var pageSize = state.ui[uiKey+"PageSize"] || 10;
  var totalPages = Math.max(1, Math.ceil(list.length / pageSize));
  var page = Math.min(Math.max(1, state.ui[uiKey+"Page"] || 1), totalPages);
  state.ui[uiKey+"Page"] = page;
  return list.slice((page-1)*pageSize, page*pageSize);
}

/* ======================= CSV export (no external library needed) ======================= */
function downloadCSV(filename, rows){
  if(rows.length===0){ rows=[{Note:"No data"}]; }
  var headers = Object.keys(rows[0]);
  var lines = [headers.join(",")];
  rows.forEach(function(r){
    lines.push(headers.map(function(h){
      var v = r[h]===undefined||r[h]===null? "" : String(r[h]);
      if(v.indexOf(",")>-1 || v.indexOf('"')>-1){ v = '"'+v.replace(/"/g,'""')+'"'; }
      return v;
    }).join(","));
  });
  var blob = new Blob([lines.join("\r\n")], {type:"text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ======================= Rendering ======================= */
let _rendering = false;
let _suppressFocusHandler = false;
function render(){
  if(_rendering) return; /* guards against re-entrant render() calls, e.g. when
    refocusing an input below fires that input's onfocus handler, which itself
    calls render() again — without this guard that recurses infinitely and
    crashes the tab (stack overflow) every time a combobox option is clicked
    while its search input keeps focus. */
  _rendering = true;
  try{
    document.documentElement.classList.toggle("dark", state.darkMode);
    var root = document.getElementById("root");

    var active = document.activeElement;
    var focusKey = (active && active.getAttribute) ? active.getAttribute("data-key") : null;
    var selStart = (active && typeof active.selectionStart === "number") ? active.selectionStart : null;
    var selEnd = (active && typeof active.selectionEnd === "number") ? active.selectionEnd : null;

    var shellHTML;
    if(state.modal){
      /* The background app (sidebar/topbar/page) is fully hidden behind the modal
         overlay, so while a modal is open we reuse the last computed shell instead
         of recomputing it on every keystroke — recomputing dashboard charts/tables
         on every character typed in a modal search box is what caused the lag. */
      if(!state._shellCache){
        state._shellCache = '<div class="app">' + renderSidebar() + '<div class="main">' + renderTopbar() + '<div class="content">' + renderPage() + '</div></div></div>';
      }
      shellHTML = state._shellCache;
    } else {
      shellHTML = '<div class="app">' + renderSidebar() + '<div class="main">' + renderTopbar() + '<div class="content">' + renderPage() + '</div></div></div>';
      state._shellCache = shellHTML;
    }

    root.innerHTML = shellHTML + renderModal();
    attachGlobalHandlers();
    persistState();

    if(focusKey){
      var el = root.querySelector('[data-key="'+focusKey+'"]');
      if(el){
        _suppressFocusHandler = true;
        el.focus();
        _suppressFocusHandler = false;
        if(selStart!==null && el.setSelectionRange){
          try{ el.setSelectionRange(selStart, selEnd); }catch(e){ /* some input types don't support it */ }
        }
      }
    }
  } finally {
    _rendering = false;
  }
}

// Monotone cubic interpolation (same approach as D3's curveMonotoneX): smooth curve through
// the points that never overshoots past a point's actual neighbors, so a flat run of days
// stays flat instead of dipping/bumping like a plain Catmull-Rom spline would.
function monotonePath(points){
  var n = points.length;
  if(n===0) return "";
  if(n===1) return "M "+points[0][0]+" "+points[0][1];
  if(n===2) return "M "+points[0][0]+" "+points[0][1]+" L "+points[1][0]+" "+points[1][1];
  var xs = points.map(function(p){return p[0];});
  var ys = points.map(function(p){return p[1];});
  var dx=[], slope=[];
  for(var i=0;i<n-1;i++){ dx[i]=xs[i+1]-xs[i]; slope[i]= dx[i]===0?0:(ys[i+1]-ys[i])/dx[i]; }
  var tangent = new Array(n);
  tangent[0]=slope[0]; tangent[n-1]=slope[n-2];
  for(i=1;i<n-1;i++){ tangent[i] = (slope[i-1]*slope[i]<=0) ? 0 : (slope[i-1]+slope[i])/2; }
  for(i=0;i<n-1;i++){
    if(slope[i]===0){ tangent[i]=0; tangent[i+1]=0; }
    else{
      var a=tangent[i]/slope[i], b=tangent[i+1]/slope[i];
      var s=a*a+b*b;
      if(s>9){ var t=3/Math.sqrt(s); tangent[i]=t*a*slope[i]; tangent[i+1]=t*b*slope[i]; }
    }
  }
  var d = "M "+xs[0]+" "+ys[0];
  for(i=0;i<n-1;i++){
    var cp1x=xs[i]+dx[i]/3, cp1y=ys[i]+(tangent[i]*dx[i])/3;
    var cp2x=xs[i+1]-dx[i]/3, cp2y=ys[i+1]-(tangent[i+1]*dx[i])/3;
    d += " C "+cp1x+" "+cp1y+", "+cp2x+" "+cp2y+", "+xs[i+1]+" "+ys[i+1];
  }
  return d;
}

// data: array of {label, value}. Smooth gradient ridgeline chart with day labels and a
// hover tooltip showing that day's exact amount.
function sparklineSVG(data, color, labelColor){
  labelColor = labelColor || "#a8a29e";
  var w=720, h=280, padTop=24, padBottom=36, padSide=18;
  var innerH = h-padTop-padBottom;
  var innerW = w-padSide*2;
  var max = Math.max.apply(null, data.map(function(d){return d.value;}).concat([1]));
  var n = data.length;
  var stepX = n>1 ? innerW/(n-1) : 0;
  var points = data.map(function(d,i){
    var x = padSide + i*stepX;
    var y = padTop + innerH - (d.value/max)*innerH;
    return {x:x, y:y, label:d.label, dayLabel:d.dayLabel||d.label, value:d.value};
  });
  var linePts = points.map(function(p){return [p.x,p.y];});
  var linePath = monotonePath(linePts);
  var areaPath = linePath+" L "+points[points.length-1].x+" "+(padTop+innerH)+" L "+points[0].x+" "+(padTop+innerH)+" Z";
  var last = points[points.length-1];
  var gid = "sparkgrad"+Math.random().toString(36).slice(2,8);
  var slotW = n>0 ? w/n : w;

  var hitCols = points.map(function(p,i){
    var slotX = i*slotW;
    var safeLabel = String(p.dayLabel).replace(/'/g,"&#39;");
    return '<rect x="'+slotX+'" y="0" width="'+slotW+'" height="'+h+'" fill="transparent" style="cursor:pointer" '+
      'onmouseenter="sparkShow(event,\''+safeLabel+'\','+p.value+')" onmousemove="sparkMove(event)" onmouseleave="sparkHide()"></rect>';
  }).join("");

  var labels = points.map(function(p,i){
    return '<text x="'+p.x+'" y="'+(h-8)+'" font-size="10" fill="'+labelColor+'" text-anchor="middle">'+esc(p.label)+'</text>';
  }).join("");

  return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;height:'+h+'px;display:block;overflow:visible;">' +
    '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="'+color+'" stop-opacity="0.32"/>' +
      '<stop offset="100%" stop-color="'+color+'" stop-opacity="0"/>' +
    '</linearGradient></defs>' +
    '<path d="'+areaPath+'" fill="url(#'+gid+')"/>' +
    '<path d="'+linePath+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '<circle cx="'+last.x+'" cy="'+last.y+'" r="4" fill="#fff" stroke="'+color+'" stroke-width="2.5"/>' +
    labels + hitCols +
  '</svg>';
}

/* ---------- Daily Cash Closing ---------- */
function renderClosing(){
  var d = state.ui.closingDate || todayISO();
  var expected = expectedCashForDate(d);
  var cashSalesCount = state.sales.filter(function(s){return s.date===d && s.paymentMethod==="cash";}).length;
  var utangSalesTotal = state.sales.filter(function(s){return s.date===d && s.paymentMethod==="utang";}).reduce(function(s,x){return s+x.total;},0);
  var utangCollected = state.utangPayments.filter(function(p){return p.date===d;}).reduce(function(s,x){return s+x.amount;},0);
  var already = state.closings.find(function(c){return c.date===d;});
  var actualVal = state.ui.closingActual!==""? state.ui.closingActual : (already? already.actualCash : "");
  var variance = actualVal!==""? Number(actualVal)-expected : null;

  var closingIds = state.closings.map(function(c){return c.date;});
  var historyRows = state.closings.map(function(c){
    var vLabel = c.variance===0 ? "Exact" : (c.variance<0 ? peso(Math.abs(c.variance))+" short" : peso(c.variance)+" over");
    return '<tr><td style="width:34px;"><input type="checkbox" '+(isSelected("closings",c.date)?"checked":"")+' onclick="toggleSelect(\'closings\',\''+c.date+'\')"></td>' +
      '<td class="muted">'+esc(c.date)+'</td><td class="tabnum">'+peso(c.expectedCash)+'</td>' +
      '<td class="tabnum">'+peso(c.actualCash)+'</td>' +
      '<td class="tabnum" style="'+(c.variance<0?'color:var(--red-fg);':c.variance>0?'color:var(--green-fg);':'')+'font-weight:700;">'+vLabel+'</td>' +
      '<td class="tr"><button class="iconbtn" onclick="removeClosing(\''+c.date+'\')" title="Delete">'+ICONS.trash+'</button></td></tr>';
  }).join("");

  return '' +
  '<div class="grid" style="grid-template-columns:1fr 1.3fr;">' +
    '<div class="card">' +
      '<h2 class="section-title">'+ICONS.calc+' End-of-Day Cash Count</h2>' +
      '<div class="field"><label>Date</label><input class="input" type="date" value="'+esc(d)+'" onchange="state.ui.closingDate=this.value; state.ui.closingActual=\'\'; render();"></div>' +
      '<div style="background:var(--stone-50);border-radius:12px;padding:14px;margin-bottom:16px;">' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13.5px;"><span class="muted">Cash sales ('+cashSalesCount+' transactions)</span><span class="strong tabnum">'+peso(expected-utangCollected)+'</span></div>' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13.5px;"><span class="muted">Utang payments collected (cash)</span><span class="strong tabnum">'+peso(utangCollected)+'</span></div>' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13.5px;"><span class="muted">New utang issued (not cash)</span><span class="strong tabnum">'+peso(utangSalesTotal)+'</span></div>' +
        '<hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">' +
        '<div style="display:flex;justify-content:space-between;font-size:14.5px;"><span class="strong">Expected cash in drawer</span><span class="strong tabnum">'+peso(expected)+'</span></div>' +
      '</div>' +
      '<div class="field"><label>Actual Cash Counted</label><input class="input" data-key="closingActual" type="text" inputmode="decimal" value="'+esc(actualVal)+'" oninput="state.ui.closingActual=sanitizeNum(this.value); render();"></div>' +
      (variance!==null? '<div style="margin-bottom:16px;font-size:14px;">Variance: <span class="strong" style="color:'+(variance<0?'var(--red-fg)':variance>0?'var(--green-fg)':'var(--stone-800)')+';">'+(variance===0?'Exact match':(variance>0?'+':'-')+peso(Math.abs(variance))+(variance<0?' short':' over'))+'</span></div>' : '') +
      '<button class="btn btn-primary btn-block" '+(actualVal===""?"disabled":"")+' onclick="submitClosing()">Save Closing for '+esc(d)+'</button>' +
    '</div>' +
    '<div class="card"><h2 class="section-title">Closing History</h2>' +
      bulkDeleteBar("closings","closing record","removeSelectedClosings()") +
      '<table><thead><tr><th style="width:34px;">'+selectAllCheckbox("closings",closingIds)+'</th><th>Date</th><th>Expected</th><th>Actual</th><th>Variance</th><th></th></tr></thead>' +
      '<tbody>'+(historyRows || '<tr><td colspan="6">'+emptyState("calc","No closings recorded yet")+'</td></tr>')+'</tbody></table>' +
    '</div>' +
  '</div>';
}
function removeClosing(dateStr){
  if(!window.confirm("Delete the cash closing record for "+dateStr+"? This cannot be undone.")) return;
  deleteClosing(dateStr); render();
}
function submitClosing(){
  var d = state.ui.closingDate || todayISO();
  var amt = Number(state.ui.closingActual);
  if(state.ui.closingActual==="" || isNaN(amt)) return;
  recordClosing(d, amt);
  render();
}

/* ---------- Reports ---------- */
function renderReports(){
  var totalRevenue = state.sales.reduce(function(s,x){return s+x.total;},0);
  var cogs = state.sales.reduce(function(sum,s){
    return sum + s.items.reduce(function(a,it){ var p = productById(it.productId); return a + it.qty*(p?p.costPrice:0); },0);
  },0);
  var grossProfit = totalRevenue - cogs;
  var totalPurchases = state.purchases.reduce(function(s,x){return s+x.total;},0);
  var invValue = inventoryValue();

  var byProduct = {};
  state.sales.forEach(function(s){ s.items.forEach(function(it){ byProduct[it.productId] = (byProduct[it.productId]||0) + it.qty*it.price; }); });
  var topProducts = Object.keys(byProduct).map(function(pid){ var p = productById(pid); return {name:p?p.name:pid, total:byProduct[pid]}; })
    .sort(function(a,b){return b.total-a.total;}).slice(0,5);

  var topHtml = topProducts.length===0? emptyState("package","No sales yet") :
    topProducts.map(function(p){ return '<div style="display:flex;justify-content:space-between;margin-bottom:11px;"><span style="font-size:13.5px;">'+esc(p.name)+'</span><span class="strong tabnum">'+peso(p.total)+'</span></div>'; }).join("");

  return '<div style="display:flex;justify-content:flex-end;margin-bottom:16px;">' +
      '<button class="btn btn-outline" onclick="exportReportCSV()">'+ICONS.download+' Export Report (.csv)</button>' +
    '</div>' +
    '<div class="grid grid-3" style="margin-bottom:20px;">' +
      statCard("cart","#0047AB","Total Revenue", peso(totalRevenue)) +
      statCard("file","#B37F00","Cost of Goods Sold", peso(cogs)) +
      statCard("trend","#1E9E4A","Gross Profit", peso(grossProfit)) +
    '</div>' +
    '<div class="grid grid-2">' +
      '<div class="card"><h2 class="section-title">Top Selling Products</h2>'+topHtml+'</div>' +
      '<div class="card"><h2 class="section-title">Inventory &amp; Purchasing</h2>' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:11px;"><span style="color:var(--stone-600);font-size:13.5px;">Total Purchases (all time)</span><span class="strong tabnum">'+peso(totalPurchases)+'</span></div>' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:11px;"><span style="color:var(--stone-600);font-size:13.5px;">Current Inventory Value</span><span class="strong tabnum">'+peso(invValue)+'</span></div>' +
        '<div style="display:flex;justify-content:space-between;"><span style="color:var(--stone-600);font-size:13.5px;">Products Tracked</span><span class="strong tabnum">'+state.products.length+'</span></div>' +
      '</div>' +
    '</div>';
}
function exportReportCSV(){
  var rows = state.sales.map(function(s){ return {Date:s.date, "Member / Buyer":memberName(s.memberId), Total:s.total, Payment:s.paymentMethod}; });
  downloadCSV("accounting-report-"+todayISO()+".csv", rows);
}

        '<input type="file" accept="application/json" style="display:none;" onchange="importBackup(this)">' +
      '</label>' +

function saveSettings(){
  state.settings.storeName = document.getElementById("set_name").value.trim() || state.settings.storeName;
  state.settings.tagline = document.getElementById("set_tagline").value.trim();
  state.settings.address = document.getElementById("set_address").value.trim();
  state.settings.contact = document.getElementById("set_contact").value.trim();
  state.settings.tin = document.getElementById("set_tin").value.trim();
  state.ui.settingsSaved = true;
  render();
}
function exportBackup(){
  var snapshot = {
    products: state.products, suppliers: state.suppliers, members: state.members,
    sales: state.sales, purchases: state.purchases, utangPayments: state.utangPayments,
    closings: state.closings, settings: state.settings, exportedAt: new Date().toISOString()
  };
  var blob = new Blob([JSON.stringify(snapshot, null, 2)], {type:"application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "olcosys-backup-"+todayISO()+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  state.ui.backupMsg = "Backup downloaded just now.";
  render();
}
function importBackup(input){
  var file = input.files && input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      if(!window.confirm("This will replace all current data in this browser with the contents of the backup file. Continue?")) return;
      ["products","suppliers","members","sales","purchases","utangPayments","closings"].forEach(function(k){
        if(Array.isArray(data[k])) state[k] = data[k];
      });
      if(data.settings && typeof data.settings==="object") state.settings = Object.assign({}, state.settings, data.settings);
      state.ui.backupMsg = "Backup restored successfully.";
      render();
    }catch(err){
      window.alert("Couldn't read that file — it doesn't look like a valid OLCOSYS backup.");
    }
  };
  reader.readAsText(file);
  input.value = "";
}
function resetToSampleData(){
  if(!window.confirm("This will erase all current data in this browser and reload the sample dataset. This cannot be undone. Continue?")) return;
  try{ window.localStorage.removeItem(OLCOSYS_LS_KEY); }catch(e){}
  window.location.reload();
}


/* ======================= Modals ======================= */
function openModal(type){
  state.modal = {type:type};
  state.ui.productFormError=null; state.ui.memberFormError=null; state.ui.supplierFormError=null;
  if(type==="newsale"){ state.cart = []; state._saleMember=""; state._salePayment="cash"; state._saleProduct = state.products[0]? state.products[0].id : ""; state._saleQty=1; state._saleTendered=""; state._saleProductSearch=""; state._saleProductOpen=false; state._saleMemberSearch=""; state._saleMemberOpen=false; }
  if(type==="recordpurchase"){ state.purchaseItems = []; state._puSupplier = state.suppliers[0]? state.suppliers[0].id : ""; state._puProduct = state.products[0]? state.products[0].id : ""; state._puQty=1; state._puCost=""; }
  if(type==="recordpayment"){ state._payMember = ""; state._payAmount=""; state._payMemberSearch=undefined; state._payMemberOpen=false; }
  render();
}
function closeModal(){ state.modal=null; render(); }

function renderModal(){
  if(!state.modal) return "";
  var t = state.modal.type;
  if(t==="newsale") return modalWrap("Record Sale", newSaleBody(), true);
  if(t==="addproduct") return modalWrap("Add Product", productFormBody(null));
  if(t==="editproduct") return modalWrap("Edit Product", productFormBody(productById(state.modal.id)));
  if(t==="addmember") return modalWrap("Add Member", memberFormBody(null));
  if(t==="editmember") return modalWrap("Edit Member", memberFormBody(memberById(state.modal.id)));
  if(t==="addsupplier") return modalWrap("Add Supplier", supplierFormBody(null));
  if(t==="editsupplier") return modalWrap("Edit Supplier", supplierFormBody(supplierById(state.modal.id)));
  if(t==="recordpurchase") return modalWrap("Record Purchase", recordPurchaseBody(), true);
  if(t==="recordpayment") return modalWrap("Record Utang Payment", recordPaymentBody());
  if(t==="receipt") return modalWrap("Sale Complete", receiptBody(state.modal.sale));
  return "";
}
function modalWrap(title, body, wide){
  return '<div class="modal-overlay">' +
    '<div class="modal '+(wide?"wide":"")+'">' +
      '<div class="modal-head"><h3>'+esc(title)+'</h3><button class="modal-close" onclick="closeModal()">'+ICONS.x+'</button></div>' +
      '<div class="modal-body">'+body+'</div>' +
    '</div></div>';
}

/* --- New sale --- */
function newSaleBody(){
  var selectedMember = memberById(state._saleMember);
  var memberSearch = state._saleMemberSearch!==undefined? state._saleMemberSearch : (selectedMember? selectedMember.name : "");
  var memberQuery = (state._saleMemberSearch||"").toLowerCase();
  var filteredMembers = state.members.filter(function(m){ return !state._saleMemberOpen || memberQuery==="" || m.name.toLowerCase().indexOf(memberQuery)>-1 || m.memberNo.toLowerCase().indexOf(memberQuery)>-1; });
  var memberComboOptions = filteredMembers.map(function(m){
      return '<div class="combobox-opt'+(state._saleMember===m.id?" active":"")+'" onmousedown="event.preventDefault(); selectSaleMember(\''+m.id+'\')">' +
        '<div>'+esc(m.name)+'</div><div class="muted">'+esc(m.memberNo)+'</div></div>';
    }).join("");
  var selectedProduct = productById(state._saleProduct);
  var productSearch = state._saleProductSearch!==undefined? state._saleProductSearch : (selectedProduct? selectedProduct.name+" — "+peso(selectedProduct.sellingPrice)+"/"+selectedProduct.unit : "");
  var productQuery = (state._saleProductSearch||"").toLowerCase();
  var filteredProducts = state.products.filter(function(p){ return !state._saleProductOpen || productQuery==="" || p.name.toLowerCase().indexOf(productQuery)>-1; });
  var comboOptions = filteredProducts.map(function(p){
    return '<div class="combobox-opt'+(state._saleProduct===p.id?" active":"")+'" onmousedown="event.preventDefault(); selectSaleProduct(\''+p.id+'\')">' +
      '<div>'+esc(p.name)+'</div><div class="muted">'+peso(p.sellingPrice)+'/'+esc(p.unit)+' &middot; '+p.stockQty+' in stock</div></div>';
  }).join("");
  var cartRows = state.cart.map(function(c){
    var p = productById(c.productId);
    return '<div class="cart-item"><div><div class="strong" style="font-size:13.5px;">'+esc(p?p.name:"?")+'</div>' +
      '<div class="muted">'+c.qty+' × '+peso(c.price)+'</div></div>' +
      '<div style="display:flex;align-items:center;gap:10px;"><span class="strong tabnum">'+peso(c.qty*c.price)+'</span>' +
      '<button class="modal-close" onclick="removeCartItem(\''+c.productId+'\')">'+ICONS.x+'</button></div></div>';
  }).join("");
  var total = state.cart.reduce(function(s,c){return s+c.qty*c.price;},0);
  var tendered = state._saleTendered!==undefined? state._saleTendered : "";
  var tenderedNum = Number(tendered)||0;
  var change = tenderedNum - total;
  var showTender = state._salePayment==="cash";
  var isUtang = state._salePayment==="utang";
  return '' +
  '<div class="grid grid-2">' +
    '<div>' +
      '<div class="field"><label>Payment Method</label><div class="pay-toggle">' +
        '<button class="'+(state._salePayment==="cash"?"active":"")+'" onclick="selectSalePayment(\'cash\')">Cash</button>' +
        '<button class="'+(state._salePayment==="utang"?"active":"")+'" onclick="selectSalePayment(\'utang\')">Utang (Credit)</button>' +
      '</div></div>' +
      (isUtang? '<div class="field"><label>Member</label>' +
      '<div class="combobox">' +
        '<input class="input" data-key="saleMemberSearch" placeholder="Search member…" value="'+esc(memberSearch)+'" ' +
          'oninput="state._saleMemberSearch=this.value; state._saleMemberOpen=true; render();" ' +
          'onfocus="if(!_suppressFocusHandler){ state._saleMemberOpen=true; render(); }" ' +
          'onblur="setTimeout(function(){ var el=document.querySelector(\'[data-key=\\\'saleMemberSearch\\\']\'); if(!el || document.activeElement!==el){ state._saleMemberOpen=false; render(); } }, 150);">' +
        (state._saleMemberOpen? '<div class="combobox-list">'+(memberComboOptions || '<div class="combobox-empty">No members found</div>')+'</div>' : '') +
      '</div>' + (!state._saleMember? '<div class="muted" style="margin-top:6px;">Select a member to record this as utang.</div>':'') + '</div>' : '') +
      '<div class="field"><label>Add Product</label>' +
      '<div class="combobox">' +
        '<input class="input" data-key="saleProductSearch" style="margin-bottom:8px;" placeholder="Search product…" value="'+esc(productSearch)+'" ' +
          'oninput="state._saleProductSearch=this.value; state._saleProductOpen=true; render();" ' +
          'onfocus="if(!_suppressFocusHandler){ state._saleProductOpen=true; render(); }" ' +
          'onblur="setTimeout(function(){ var el=document.querySelector(\'[data-key=\\\'saleProductSearch\\\']\'); if(!el || document.activeElement!==el){ state._saleProductOpen=false; render(); } }, 150);">' +
        (state._saleProductOpen? '<div class="combobox-list">'+(comboOptions || '<div class="combobox-empty">No products found</div>')+'</div>' : '') +
      '</div>' +
      '<div class="row"><input class="input" type="number" min="1" value="'+state._saleQty+'" oninput="state._saleQty=this.value;">' +
      '<button class="btn btn-dark" style="flex:0 0 auto;" onclick="addCartItem()">Add</button></div></div>' +
      (showTender? '<div class="field"><label>Cash Tendered</label><input class="input" data-key="saleTendered" type="text" inputmode="decimal" placeholder="'+total.toFixed(2)+'" value="'+esc(tendered)+'" oninput="state._saleTendered=sanitizeNum(this.value); render();"></div>' +
        '<div style="display:flex;justify-content:space-between;font-size:14px;padding:10px 12px;background:var(--stone-50);border-radius:10px;">' +
          '<span class="muted">Change</span><span class="strong tabnum" style="'+(change<0?'color:var(--red-fg);':'')+'">'+(tendered===""?"—":peso(Math.max(0,change)))+(change<0?' (short '+peso(Math.abs(change))+')':'')+'</span>' +
        '</div>' : '') +
    '</div>' +
    '<div>' +
      '<label style="display:block;font-size:11px;font-weight:700;color:var(--stone-500);text-transform:uppercase;margin-bottom:6px;">Cart</label>' +
      '<div class="cart-list">'+(cartRows || '<div style="padding:16px;text-align:center;color:var(--stone-400);font-size:13.5px;">No items yet</div>')+'</div>' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:16px;"><span class="strong">Total</span><span style="font-size:20px;font-weight:800;" class="tabnum">'+peso(total)+'</span></div>' +
      '<button class="btn btn-accent btn-block" '+((state.cart.length===0 || (isUtang && !state._saleMember))?"disabled":"")+' onclick="submitSale()">Complete Sale</button>' +
    '</div>' +
  '</div>';
}
function selectSalePayment(method){
  state._salePayment = method;
  if(method==="cash"){
    state._saleMember = "";
    state._saleMemberSearch = "";
    state._saleMemberOpen = false;
  }
  render();
}
function selectSaleMember(mid){
  var m = memberById(mid);
  state._saleMember = mid;
  state._saleMemberSearch = m? m.name : "";
  state._saleMemberOpen = false;
  render();
}
function selectSaleProduct(pid){
  var p = productById(pid);
  state._saleProduct = pid;
  state._saleProductSearch = p? p.name+" — "+peso(p.sellingPrice)+"/"+p.unit : "";
  state._saleProductOpen = false;
  render();
}
function addCartItem(){
  var p = productById(state._saleProduct);
  var qty = Number(state._saleQty);
  if(!p || !qty || qty<=0) return;
  var existing = state.cart.find(function(c){return c.productId===state._saleProduct;});
  if(existing){ existing.qty += qty; } else { state.cart.push({productId:state._saleProduct, qty:qty, price:p.sellingPrice}); }
  state._saleQty = 1;
  state._saleProduct = "";
  state._saleProductSearch = "";
  state._saleProductOpen = false;
  render();
}
function removeCartItem(pid){ state.cart = state.cart.filter(function(c){return c.productId!==pid;}); render(); }
function submitSale(){
  if(state.cart.length===0) return;
  if(state._salePayment==="utang" && !state._saleMember) return;
  var sale = recordSale(state._salePayment==="utang"? state._saleMember : null, state.cart, state._salePayment, state._saleTendered);
  state.modal = {type:"receipt", sale:sale};
  render();
}

/* --- Add product --- */
function productFormBody(p){
  var catOptions = CATEGORIES.map(function(c){return '<option '+(p&&p.category===c?"selected":"")+'>'+c+'</option>';}).join("");
  var err = state.ui.productFormError;
  return '' +
  (err? '<div style="background:var(--red-bg);color:var(--red-fg);font-size:13px;font-weight:600;padding:9px 12px;border-radius:8px;margin-bottom:14px;">'+esc(err)+'</div>' : '') +
  '<div class="row"><div class="field"><label>SKU</label><input class="input" id="f_sku" value="'+esc(p?p.sku:"")+'"></div>' +
  '<div class="field"><label>Category</label><select class="input" id="f_cat">'+catOptions+'</select></div></div>' +
  '<div class="field"><label>Product Name</label><input class="input" id="f_name" value="'+esc(p?p.name:"")+'"></div>' +
  '<div class="row"><div class="field"><label>Unit</label><input class="input" id="f_unit" placeholder="kg, pc, pack…" value="'+esc(p?p.unit:"")+'"></div>' +
  '<div class="field"><label>Cost Price</label><input class="input" type="number" id="f_cost" value="'+(p?p.costPrice:"")+'"></div>' +
  '<div class="field"><label>Selling Price</label><input class="input" type="number" id="f_price" value="'+(p?p.sellingPrice:"")+'"></div></div>' +
  '<div class="row"><div class="field"><label>'+(p?"Stock Qty":"Initial Stock Qty")+'</label><input class="input" type="number" id="f_stock" value="'+(p?p.stockQty:"")+'"></div>' +
  '<div class="field"><label>Reorder Level</label><input class="input" type="number" id="f_reorder" value="'+(p?p.reorderLevel:"")+'"></div></div>' +
  '<div class="field"><label>Expiry Date (optional — for perishables)</label><input class="input" type="date" id="f_expiry" value="'+esc(p?p.expiryDate||"":"")+'"></div>' +
  '<button class="btn btn-primary btn-block" onclick="submitProductForm(\''+(p?p.id:"")+'\')">'+(p?"Save Changes":"Save Product")+'</button>';
}
function submitProductForm(editId){
  var name = document.getElementById("f_name").value.trim();
  var sku = document.getElementById("f_sku").value.trim();
  var cost = Number(document.getElementById("f_cost").value)||0;
  var price = Number(document.getElementById("f_price").value)||0;
  if(!name || !sku){ state.ui.productFormError = "Product Name and SKU are required."; render(); return; }
  if(price < cost){ state.ui.productFormError = "Selling price should not be lower than cost price."; render(); return; }
  state.ui.productFormError = null;
  var data = {
    sku:sku, name:name, category:document.getElementById("f_cat").value, unit:document.getElementById("f_unit").value||"pc",
    costPrice:cost, sellingPrice:price,
    stockQty:Number(document.getElementById("f_stock").value)||0, reorderLevel:Number(document.getElementById("f_reorder").value)||0,
    expiryDate: document.getElementById("f_expiry").value || "",
  };
  if(editId){ updateProduct(editId, data); } else { addProduct(data); }
  closeModal();
}
function openEditProduct(id){ state.ui.productFormError=null; state.modal = {type:"editproduct", id:id}; render(); }

/* --- Add member --- */
function memberFormBody(m){
  var err = state.ui.memberFormError;
  return '' +
  (err? '<div style="background:var(--red-bg);color:var(--red-fg);font-size:13px;font-weight:600;padding:9px 12px;border-radius:8px;margin-bottom:14px;">'+esc(err)+'</div>' : '') +
  '<div class="field"><label>Full Name</label><input class="input" id="f_mname" value="'+esc(m?m.name:"")+'"></div>' +
  '<div class="field"><label>Contact Number</label><input class="input" id="f_mcontact" value="'+esc(m?m.contact:"")+'"></div>' +
  '<div class="field"><label>Address</label><input class="input" id="f_maddress" value="'+esc(m?m.address:"")+'"></div>' +
  '<div class="field"><label>Credit Limit</label><input class="input" type="number" id="f_mlimit" value="'+(m?m.creditLimit:2000)+'"></div>' +
  (m? '<div class="field"><label>Loyalty Points</label><div class="input" style="background:var(--stone-50);color:var(--stone-600);">'+pts(m.points)+' pts <span class="muted">(earned automatically — '+POINTS_RATE+' pt per ₱1 spent)</span></div></div>' : '') +
  '<button class="btn btn-primary btn-block" onclick="submitMemberForm(\''+(m?m.id:"")+'\')">'+(m?"Save Changes":"Save Member")+'</button>';
}
function submitMemberForm(editId){
  var name = document.getElementById("f_mname").value.trim();
  if(!name){ state.ui.memberFormError = "Full name is required."; render(); return; }
  state.ui.memberFormError = null;
  var data = {name:name, contact:document.getElementById("f_mcontact").value, address:document.getElementById("f_maddress").value, creditLimit:Number(document.getElementById("f_mlimit").value)||0};
  if(editId){ updateMember(editId, data); } else { addMember(data); }
  closeModal();
}
function openEditMember(id){ state.ui.memberFormError=null; state.modal = {type:"editmember", id:id}; render(); }

/* --- Add/Edit supplier --- */
function supplierFormBody(s){
  var err = state.ui.supplierFormError;
  return '' +
  (err? '<div style="background:var(--red-bg);color:var(--red-fg);font-size:13px;font-weight:600;padding:9px 12px;border-radius:8px;margin-bottom:14px;">'+esc(err)+'</div>' : '') +
  '<div class="field"><label>Supplier Name</label><input class="input" id="f_sname" value="'+esc(s?s.name:"")+'"></div>' +
  '<div class="field"><label>Contact Number</label><input class="input" id="f_scontact" value="'+esc(s?s.contact:"")+'"></div>' +
  '<div class="field"><label>Address</label><input class="input" id="f_saddress" value="'+esc(s?s.address:"")+'"></div>' +
  '<button class="btn btn-primary btn-block" onclick="submitSupplierForm(\''+(s?s.id:"")+'\')">'+(s?"Save Changes":"Save Supplier")+'</button>';
}
function submitSupplierForm(editId){
  var name = document.getElementById("f_sname").value.trim();
  if(!name){ state.ui.supplierFormError = "Supplier name is required."; render(); return; }
  state.ui.supplierFormError = null;
  var data = {name:name, contact:document.getElementById("f_scontact").value, address:document.getElementById("f_saddress").value};
  if(editId){ updateSupplier(editId, data); } else { addSupplier(data); }
  closeModal();
}
function openEditSupplier(id){ state.ui.supplierFormError=null; state.modal = {type:"editsupplier", id:id}; render(); }

/* --- Record purchase --- */
function recordPurchaseBody(){
  var supplierOptions = state.suppliers.map(function(s){return '<option value="'+s.id+'" '+(state._puSupplier===s.id?"selected":"")+'>'+esc(s.name)+'</option>';}).join("");
  var productOptions = state.products.map(function(p){return '<option value="'+p.id+'" '+(state._puProduct===p.id?"selected":"")+'>'+esc(p.name)+'</option>';}).join("");
  var itemRows = state.purchaseItems.map(function(it,i){
    var p = productById(it.productId);
    return '<div class="cart-item"><div class="strong" style="font-size:13.5px;">'+esc(p?p.name:"?")+' <span class="muted">'+it.qty+' × '+peso(it.cost)+'</span></div>' +
      '<div style="display:flex;align-items:center;gap:10px;"><span class="strong tabnum">'+peso(it.qty*it.cost)+'</span>' +
      '<button class="modal-close" onclick="removePurchaseItem('+i+')">'+ICONS.x+'</button></div></div>';
  }).join("");
  var total = state.purchaseItems.reduce(function(s,it){return s+it.qty*it.cost;},0);
  return '' +
  '<div class="field"><label>Supplier</label><select class="input" onchange="state._puSupplier=this.value;">'+supplierOptions+'</select></div>' +
  '<div class="row" style="align-items:flex-end;">' +
    '<div class="field" style="flex:2;"><label>Product</label><select class="input" onchange="state._puProduct=this.value;">'+productOptions+'</select></div>' +
    '<div class="field"><label>Qty</label><input class="input" type="number" min="1" value="'+state._puQty+'" oninput="state._puQty=this.value;"></div>' +
    '<div class="field"><label>Unit Cost</label><input class="input" type="number" placeholder="auto" value="'+state._puCost+'" oninput="state._puCost=this.value;"></div>' +
  '</div>' +
  '<button class="btn btn-dark btn-block" style="margin-bottom:16px;" onclick="addPurchaseItem()">Add Item</button>' +
  '<div class="cart-list">'+(itemRows || '<div style="padding:16px;text-align:center;color:var(--stone-400);font-size:13.5px;">No items yet</div>')+'</div>' +
  '<div style="display:flex;justify-content:space-between;margin:16px 0;"><span class="strong">Total Cost</span><span style="font-size:20px;font-weight:800;" class="tabnum">'+peso(total)+'</span></div>' +
  '<button class="btn btn-primary btn-block" '+(state.purchaseItems.length===0?"disabled":"")+' onclick="submitPurchase()">Record Purchase &amp; Update Stock</button>';
}
function addPurchaseItem(){
  var p = productById(state._puProduct);
  var qty = Number(state._puQty);
  if(!p || !qty || qty<=0) return;
  state.purchaseItems.push({productId:state._puProduct, qty:qty, cost:Number(state._puCost)||p.costPrice});
  state._puQty=1; state._puCost="";
  render();
}
function removePurchaseItem(i){ state.purchaseItems.splice(i,1); render(); }
function submitPurchase(){
  if(state.purchaseItems.length===0 || !state._puSupplier) return;
  recordPurchase(state._puSupplier, state.purchaseItems);
  closeModal();
}

/* --- Record utang payment --- */
function recordPaymentBody(){
  var selectedMember = memberById(state._payMember);
  var memberSearch = state._payMemberSearch!==undefined? state._payMemberSearch : (selectedMember? selectedMember.name : "");
  var memberQuery = (state._payMemberSearch||"").toLowerCase();
  var filteredMembers = state.members.filter(function(m){ return !state._payMemberOpen || memberQuery==="" || m.name.toLowerCase().indexOf(memberQuery)>-1 || m.memberNo.toLowerCase().indexOf(memberQuery)>-1; });
  var memberComboOptions = filteredMembers.map(function(m){
      return '<div class="combobox-opt'+(state._payMember===m.id?" active":"")+'" onmousedown="event.preventDefault(); selectPayMember(\''+m.id+'\')">' +
        '<div>'+esc(m.name)+'</div><div class="muted">'+esc(m.memberNo)+'</div></div>';
    }).join("");
  var bal = state._payMember? memberBalance(state._payMember) : 0;
  var err = state.ui.paymentFormError;
  return '' +
  (err? '<div style="background:var(--red-bg);color:var(--red-fg);font-size:13px;font-weight:600;padding:9px 12px;border-radius:8px;margin-bottom:14px;">'+esc(err)+'</div>' : '') +
  '<div class="field"><label>Member</label>' +
  '<div class="combobox">' +
    '<input class="input" data-key="payMemberSearch" placeholder="Search member…" value="'+esc(memberSearch)+'" ' +
      'oninput="state._payMemberSearch=this.value; state._payMemberOpen=true; render();" ' +
      'onfocus="if(!_suppressFocusHandler){ state._payMemberOpen=true; render(); }" ' +
      'onblur="setTimeout(function(){ var el=document.querySelector(\'[data-key=\\\'payMemberSearch\\\']\'); if(!el || document.activeElement!==el){ state._payMemberOpen=false; render(); } }, 150);">' +
    (state._payMemberOpen? '<div class="combobox-list">'+(memberComboOptions || '<div class="combobox-empty">No members found</div>')+'</div>' : '') +
  '</div></div>' +
  '<div class="muted" style="margin-bottom:16px;">Current balance: <span class="strong" style="color:var(--red-fg);">'+peso(bal)+'</span></div>' +
  '<div class="field"><label>Payment Amount</label><input class="input" type="number" value="'+state._payAmount+'" oninput="state._payAmount=this.value;"></div>' +
  '<button class="btn btn-primary btn-block" onclick="submitPayment()">Record Payment</button>';
}
function selectPayMember(mid){
  var m = memberById(mid);
  state._payMember = mid;
  state._payMemberSearch = m? m.name : "";
  state._payMemberOpen = false;
  render();
}
function submitPayment(){
  var amt = Number(state._payAmount);
  if(!state._payMember || !amt || amt<=0){ state.ui.paymentFormError = "Enter a valid payment amount greater than zero."; render(); return; }
  state.ui.paymentFormError = null;
  recordUtangPayment(state._payMember, amt);
  closeModal();
}

/* --- Receipt --- */
function receiptBody(sale){
  if(!sale) return "";
  var itemRows = sale.items.map(function(it){
    var p = productById(it.productId);
    return '<div class="line"><span>'+it.qty+' '+esc(p?p.unit:"")+' '+esc(p?p.name:"?")+'</span><span>'+peso(it.qty*it.price)+'</span></div>';
  }).join("");
  var custLine = sale.memberId ? '<div class="line"><span>Member</span><span>'+esc(memberName(sale.memberId))+'</span></div>' : '';
  var pointsLine = sale.memberId ? '<div class="line"><span>Points Earned</span><span>+'+pts(sale.pointsEarned||0)+' pts</span></div>' +
    '<div class="line"><span>Points Balance</span><span>'+pts(memberById(sale.memberId)? memberById(sale.memberId).points : 0)+' pts</span></div>' : '';
  var paymentBlock = sale.paymentMethod==="cash" ?
    '<div class="line"><span>Cash Tendered</span><span>'+peso(sale.cashTendered)+'</span></div>' +
    '<div class="line"><span>Change</span><span>'+peso(sale.change)+'</span></div>' :
    '<div class="line"><span>Payment</span><span>UTANG (Credit)</span></div>';
  return '' +
  '<div class="receipt">' +
    '<div class="center biz">'+esc(state.settings.storeName)+'</div>' +
    '<div class="center">'+esc(state.settings.tagline)+'</div>' +
    (state.settings.address? '<div class="center muted">'+esc(state.settings.address)+'</div>' : '') +
    (state.settings.contact? '<div class="center muted">Tel: '+esc(state.settings.contact)+'</div>' : '') +
    '<hr>' +
    '<div class="line"><span>Receipt No.</span><span>'+esc(sale.orNo||sale.id)+'</span></div>' +
    '<div class="line"><span>Date</span><span>'+esc(sale.date)+' '+esc(sale.time||"")+'</span></div>' +
    '<hr>' +
    itemRows +
    '<hr>' +
    '<div class="line" style="font-weight:800;"><span>TOTAL</span><span>'+peso(sale.total)+'</span></div>' +
    custLine +
    pointsLine +
    paymentBlock +
    '<hr>' +
    '<div class="center muted">Salamat po sa inyong pagtangkilik!</div>' +
  '</div>' +
  '<div class="no-print" style="display:flex;gap:8px;margin-top:20px;">' +
    '<button class="btn btn-outline btn-block" onclick="closeModal()">Close</button>' +
    '<button class="btn btn-primary btn-block" onclick="window.print()">'+ICONS.printer+' Print Receipt</button>' +
  '</div>';
}

/* ======================= Global nav handlers ======================= */
function goPage(p){ state.page = p; state.ui.selectedMemberLedger=null; render(); }
function toggleSidebar(){ state.sidebarOpen = !state.sidebarOpen; render(); }
function toggleDark(){ state.darkMode = !state.darkMode; render(); }
function attachGlobalHandlers(){
  document.querySelectorAll('input[data-indeterminate="1"]').forEach(function(el){ el.indeterminate = true; });
  positionComboboxLists();
}
/* Each .combobox-list is position:fixed so it can float freely above the modal
   instead of being clipped by the modal's own overflow-y:auto + rounded corners.
   Since it's no longer positioned relative to its parent via CSS, we compute its
   on-screen coordinates here to sit directly under its input. */
function positionComboboxLists(){
  document.querySelectorAll('.combobox-list').forEach(function(list){
    var wrap = list.closest(".combobox");
    var input = wrap ? wrap.querySelector("input") : null;
    if(!input) return;
    var r = input.getBoundingClientRect();
    list.style.top = (r.bottom + 4) + "px";
    list.style.left = r.left + "px";
    list.style.width = r.width + "px";
  });
}
window.addEventListener("scroll", positionComboboxLists, true);
window.addEventListener("resize", positionComboboxLists);

render();
initFirebaseSync();
</script>
